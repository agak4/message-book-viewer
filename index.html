<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>클리셰 1주년 팬 메세지북</title>

    <!-- [FIX] 첫 페이지 이미지를 HTML 파싱 단계에서 즉시 고우선도로 fetch -->
    <!-- JS가 실행되기 전, 심지어 CSS보다 먼저 브라우저 preload 스캐너가 처리함 -->
    <link rel="preload" as="image" href="images/webp/photo000.webp" type="image/webp">
    <link rel="preload" as="image" href="images/webp/photo001.webp" type="image/webp">
    <link rel="preload" as="image" href="images/webp/photo002.webp" type="image/webp">
    <link rel="preload" as="image" href="images/webp/photo003.webp" type="image/webp">

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" rel="stylesheet">
    <link rel="icon" href="images/favicon.ico">
</head>

<body>
    <div class="ebook-container">
        <div class="book-viewport">
            <div class="book" id="book">

            </div>
        </div>



        <div class="controls-container">
            <div id="pageCounter"></div>
        </div>

        <div class="progress-container">

            <div id="bookmarkTrack" class="bookmark-track"></div>
            <div class="progress-bg"></div>
            <div class="progress-fill" id="progressFill"></div>
            <input type="range" id="progressBar" min="0" max="100" value="0">
            <div id="pagePreview" class="page-preview">
                <img id="previewImage" src="" alt="Preview">
                <span id="previewText">Page 1</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
